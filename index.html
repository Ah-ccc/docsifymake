<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Docsify + GitHub Pages 建站教程</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="手把手教你用 Docsify + GitHub Pages 搭建免费静态网站">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      // ========== 基础配置 ==========
      name: 'Docsify 建站教程',           // 侧边栏顶部显示的网站名称
      repo: 'https://github.com/Ah-ccs/ah-ccs-edu', // 右上角 GitHub 链接（改成你自己的）
      loadSidebar: true,                // 启用侧边栏（必须有 _sidebar.md）
      subMaxLevel: 3,                   // 侧边栏显示到第几级标题（1~6）
      search: 'auto',                   // 启用全文搜索

      // ========== 导航增强 ==========
      auto2top: true,                   // 切换页面时自动滚动到顶部
      loadNavbar: false,                // 是否启用顶部导航栏（需要 _navbar.md）
      mergeNavbar: false,               // 是否将顶部导航和侧边栏合并

      // ========== 阅读体验 ==========
      maxLevel: 4,                      // 文章内目录（TOC）最大层级
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
      },                                // 页面底部显示“上一章/下一章”翻页

      // ========== 页脚 ==========
      footer: {
        style: 'text-align:center; color:#aaa; padding:20px 0;',
        text: '© 2026 Ah-ccs | 基于 Docsify 搭建'
      },                                // 页面底部版权信息

      // ========== 其他 ==========
      relativePath: true,               // 使用相对路径（便于本地预览）
      topMargin: 0,                     // 页面顶部留白
      notFoundPage: true,               // 启用 404 页面（找不到文件时显示提示）
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 页面底部翻页插件（需要 _sidebar.md 按顺序排列） -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
</body>
</html>
